apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notes-app
  namespace: notes-app
spec:
  replicas: 3

  selector:
    matchLabels:
      app: notes-app

  strategy:
    canary:
      canaryService: notes-canary
      stableService: notes-stable

      trafficRouting:
        nginx:
          stableIngress: notes-ingress

      steps:
      - setWeight: 20
      - pause: {duration: 30s}
      - setWeight: 50
      - pause: {duration: 30s}
      - setWeight: 100

  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
      - name: notes-app
        image: azuredevdevops/notes-app:128
        ports:
        - containerPort: 80
