apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notes-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notes-app

  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
      - name: notes-app
        image: your-image
        ports:
        - containerPort: 8000

  strategy:
  canary:
    stableService: notes-stable      ✅ REQUIRED
    canaryService: notes-canary      ✅ REQUIRED

    steps:
    - setWeight: 20
    - pause: {}
    - setWeight: 50
    - pause: {}
