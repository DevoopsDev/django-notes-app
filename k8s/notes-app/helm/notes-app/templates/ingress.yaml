apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "notes-app.fullname" . }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx-v2
  tls:
  - hosts:
    - notes.devopsdev.wuaze.com
    secretName: notes-tls
  rules:
  - host: notes.devopsdev.wuaze.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "notes-app.fullname" . }}
            port:
              number: 80
